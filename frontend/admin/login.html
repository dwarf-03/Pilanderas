<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel Admin — Las Pilanderas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../css/styles.css"/>
<style>
    .login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    }
    .login-card {
    max-width: 420px;
    width: 100%;
    }
    .login-card .card-header {
    text-align: center;
    }
</style>
</head>
<body>

<div class="login-wrapper">
    <div class="card card-formulario login-card">
    <div class="card-header">
        <i class="bi bi-shield-lock-fill"></i> Panel Administrativo
    </div>
    <div class="card-body p-4">

        <p class="text-muted text-center mb-4">
        Monumento Las Pilanderas — Riohacha, La Guajira
        </p>

        <form id="formLogin" novalidate>

        <div class="mb-3">
            <label class="form-label fw-semibold">
            <i class="bi bi-envelope"></i> Correo electrónico
            </label>
            <input type="email" class="form-control" id="email"
                placeholder="admin@pilanderas.com" required/>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">
            <i class="bi bi-key"></i> Contraseña
            </label>
            <input type="password" class="form-control" id="password"
                placeholder="••••••••" required/>
        </div>

        <div id="errorLogin" class="alert alert-danger d-none" role="alert"></div>

        <button type="submit" class="btn btn-pilanderas">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>

        </form>

        <div class="text-center mt-3">
        <a href="../index.html" class="small text-muted">
            <i class="bi bi-arrow-left"></i> Volver al formulario de visitantes
        </a>
        </div>

    </div>
</div>
</div>

<script src="js/login.js"></script>
</body>
</html>
